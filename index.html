<body class="bg-[#F8FAFC] pb-10">
    <nav class=" bg-base-100 shadow p-3 ">
        <section class="flex flex-wrap gap-3 container m-auto justify-between items-center">
            <section class="">
                <div class="flex items-center gap-3">
                    <img width="50" src="assets/github-logo.png" alt="">
                    <h2 class="font-bold sm:text-sm md:text-2xl lg:text-3xl text-lg">Github Issue Tracker</h2>
                </div>

            </section>
            <section class="">
                <div class="flex gap-2 items-center">
                    <input type="text" id="search" oninput="searchField()" class="input inline-block" placeholder="Search issues">
                    <button onclick="searchField()" class="btn btn-primary  inline-block">New Issue</button>
                </div>
            </section>
        </section>
    </nav>

    <section class="container m-auto mt-12">
        <section class="flex bg-base-100 p-5 rounded-2xl shadow justify-between">
            <section>
                <button id="all" onclick="filterData('all')" class="btn active btn-outline btn-primary">All</button>
                <button id="open" onclick="filterData('open')" class="btn btn-outline btn-primary">Open</button>
                <button id="closed" onclick="filterData('closed')" class="btn  btn-outline btn-primary">Closed</button>
            </section>
            <section></section>
        </section>
    </section>

    <section class="container m-auto mt-12">
        <section class="flex bg-base-100 p-5 gap-3 flex-wrap rounded-2xl shadow justify-between">
            <section>
                <div class="flex flex-wrap items-center gap-3">
                    <div>
                        <img width="50" src="assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 id="total" class="font-bold text-2xl">50 Issue</h2>
                        <h3 class="text-gray-500">Track and manage your project issues</h3>
                    </div>
                </div>
            </section>
            <section class="flex gap-3.5 itmes-center">
                <div class="flex gap-3.5 itmes-center">
                    <div class="flex items-center gap-2">
                        <span class="block w-3 h-3 bg-green-600 rounded-full"></span>
                        <span class="font-semibold">Open</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="block w-3 h-3 bg-violet-700 rounded-full"></span>
                        <span class="font-semibold">Closed</span>
                    </div>
                </div>
            </section>
        </section>
    </section>
